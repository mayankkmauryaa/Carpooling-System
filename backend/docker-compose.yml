# ============================================
# Carpooling System - Production Docker Compose
# Uses Neon cloud database (no local PostgreSQL)
# ============================================

services:
  # ==========================================
  # Backend API Service
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carpooling-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Server
      NODE_ENV: production
      PORT: 3000
      APP_NAME: Carpooling System
      
      # Database (Neon)
      DATABASE_URL: ${DATABASE_URL}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_URL: redis://redis:6379
      
      # Cache
      CACHE_TTL: ${CACHE_TTL:-300}
      CACHE_USER_TTL: ${CACHE_USER_TTL:-600}
      CACHE_RIDE_TTL: ${CACHE_RIDE_TTL:-300}
      CACHE_SEARCH_TTL: ${CACHE_SEARCH_TTL:-60}
      
      # Rate Limiting
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      
      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      
      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3000/api/v1/auth/google/callback}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - carpooling-network

  # ==========================================
  # Redis Service
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: carpooling-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - carpooling-network

# ==========================================
# Networks
# ==========================================
networks:
  carpooling-network:
    driver: bridge

# ==========================================
# Volumes
# ==========================================
volumes:
  redis-data:
    driver: local
